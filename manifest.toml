packaging_format = 2

id = "lemmy"
name = "Lemmy"
description.en = "Link aggregator/Reddit clone for the fediverse"
description.fr = "Agrégateur de liens/clone Reddit pour le fedivers"

version = "0.19.11~ynh5"

maintainers = []

[upstream]
license = "GPL-3.0"
website = "https://join-lemmy.org/"
demo = "https://lemmy.ml/"
admindoc = "https://join-lemmy.org/docs/en/"
code = "https://github.com/LemmyNet/lemmy"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = ["amd64", "arm64"]
multi_instance = false

ldap = false
sso = false

disk = "825M"
ram.build = "262M"
ram.runtime = "197M"

[install]
    [install.domain]
    type = "domain"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

    [install.admin]
    type = "user"

    [install.password]
    type = "password"

    [install.instance_name]
    ask.en = "Choose a name for your Lemmy instance"
    ask.fr = "Choisissez un nom pour votre instance Lemmy"
    type = "string"
    example = "My lemmy"
    default = "My lemmy"

[resources]
    [resources.sources]

    [resources.sources.lemmy]
    format = "docker"
    extract = true
    prefetch = false
    amd64.url = "dessalines/lemmy:0.19.16"
    amd64.sha256 = "231ae7ea2d397dd086f96ca69f3f4335c380d5863c6b29f673f2a7734632f600"
    arm64.url = "dessalines/lemmy:0.19.16"
    arm64.sha256 = "04738763c7d4b0b12b4316dfc60cd08f582993eee19e914cc355a07d953dfb0c"


    [resources.sources.lemmy-ui]
    format = "docker"
    extract = true
    prefetch = false
    amd64.url = "dessalines/lemmy-ui:0.19.16"
    amd64.sha256 = "b520a00515ea7c5ef13846f19a6681b365eb42b42ab16cef0d4b9f50fdbcef32"
    arm64.url = "dessalines/lemmy-ui:0.19.16"
    arm64.sha256 = "94db2de5e80c9a154c7e4f1b916bc05bd3ee5b5fe1ceacc693515774ebb9a089"

    [resources.sources.pict-rs]
    format = "docker"
    extract = true
    prefetch = false
    amd64.url = "asonix/pictrs:0.6.0-rc.4"
    amd64.sha256 = "c07808928447d6bb2f9e504d9b565d85d2d2fd6e137b7da7300e4050bb7a1722"
    arm64.url = "asonix/pictrs:0.6.0-rc.4"
    arm64.sha256 = "7960a0403e56400c0b03a5f234b345e8ade18a69eaaeaceaadb773f3c205635e"

    [resources.sources.lemmy-translations]
    url = "https://github.com/LemmyNet/lemmy-translations/archive/26962b1755f6c7b61d4e16e097ce109c3932c034.tar.gz"
    sha256 = "7311dfc95baccfa4dcfb8cd2ec00fd472d40e9a71b1e0d129a6e900ba909b0b7"
    autoupdate.upstream = "https://github.com/LemmyNet/lemmy-translations/"
    autoupdate.strategy = "latest_github_commit"

    [resources.system_user]
    allow_email = true

    [resources.install_dir]

    [resources.data_dir]
    subdirs = ["pictrs-data", "sled", "exports", "magick"]

    [resources.permissions]
    main.url = "/"

    pictrs.url = "/pictrs"
    pictrs.allowed = "visitors"
    pictrs.show_tile = false
    pictrs.protected = true
    
    api.url = "/api"
    api.allowed = "visitors"
    api.auth_header = false
    api.show_tile = false
    api.protected = true

    inbox.url = "/inbox"
    inbox.allowed = "visitors"
    inbox.auth_header = false
    inbox.show_tile = false
    inbox.protected = true

    [resources.ports]
    main.default = 8536
    pictrs.default = 8080
    ui.default = 1235

    [resources.apt]
    packages = "postgresql, espeak, rsync, libfuse2, libimage-exiftool-perl, ffmpeg"

    [resources.database]
    type = "postgresql"

    [resources.nodejs]
    version = "20"
